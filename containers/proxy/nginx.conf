user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

# Routing for Postgres
stream {
    upstream postgres {
        server db:5432;
    }

    server {
        listen     5432;
        proxy_pass postgres;
        proxy_timeout 300s;
    }
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Service names from docker-compose
    upstream backend_api { server backend:8000; }
    upstream frontend_app { server frontend:80; }

    server {
        listen 80;
        server_name _;

        # 1) API requests
        location /api/ {
            # Strips '/api' from the front before passing to FastAPI
            rewrite             ^/api(/.*)$ $1 break;
            proxy_pass          http://backend_api;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
        }

        # 2) Frontend / Static files
        location / {
            proxy_pass          http://frontend_app;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            
            # Support for WebSockets (Vite HMR, etc)
            proxy_http_version  1.1;
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        "upgrade";
        }
    }
}
