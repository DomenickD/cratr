services:
  db:
    image: postgres:15-alpine
    container_name: cratr_db
    restart: always
    environment:
      POSTGRES_DB: cratr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: cratr_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_password@db:5432/cratr
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: cratr_frontend
    restart: always
    depends_on:
      - backend

  proxy:
    build: ./containers/proxy
    container_name: cratr_proxy
    restart: always
    ports:
      - "80:80"
      - "5432:5432"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
